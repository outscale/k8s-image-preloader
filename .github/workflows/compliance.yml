name: Compliance

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
    - name: Plumber
      uses: outscale/.github/pipeline-compliance@f9320b14767302cb5137420f451b7b475812cf47 # main
      with:
        github-token: ${{ secrets.PLUMBER_TOKEN }}
