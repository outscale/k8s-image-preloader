name: lint
on:
  pull_request:
    branches: [main]
    paths:
      - "**.go"
      - "**.mod"
      - "**.sum"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: 🔎 golangci-lint
        uses: outscale/goutils/.github/actions/lint@main
