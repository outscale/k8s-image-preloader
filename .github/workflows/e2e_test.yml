name: e2e_test

on:
  pull_request:
    branches:
      - main
    paths:
      - "**.go"
      - "**.sh"
      - "Dockerfile"
      - "Makefile"
      - "go.*"
      - ".github/workflows/e2e_test.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: [self-hosted, linux]
    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: ⬇️ Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: 'go.mod'
    - name: ⬇️ Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
    - name: 🐳 Login to Docker Hub
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ vars.REGISTRY }}
        username: admin
        password: ${{ secrets.HARBOR_ADMIN_PASSWORD }}
    - name: 📦 Run GoReleaser
      uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
      with:
        version: 'v2.15.4'
        args: release --clean --snapshot
    - name: 📦  Push the Docker image
      run: |
        make image-tag image-push
      env:
        IMAGE: "outscale/k8s-image-preloader"
        IMAGE_TAG: dev-amd64
        REGISTRY_IMAGE: "${{ vars.REGISTRY }}/outscale/k8s-image-preloader"
        REGISTRY_TAG: ${{ github.sha }}
  e2e:
    strategy:
      matrix:
        img_kubernetes: ${{ fromJson(vars.IMG_KUBERNETES_MATRIX) }}
    runs-on: [self-hosted, linux]
    needs: build
    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: 🔐 Set ak/sk name based on runner region
      run: .github/scripts/runneraksk.sh
    - name: ⬇️ Install kubectl
      uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
      with:
        version: v1.32.9
    - name: ⬇️ Install helm
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      with:
        version: v3.18.5
    - name: 🧹 Frieza
      uses: outscale/frieza-github-actions/frieza-clean@373088e518c62c8fceb29e49bf6db4298da87113 # v0.15.0
      with:
        access_key: ${{ secrets[env.OSC_ACCESS_KEY_NAME] }}
        secret_key: ${{ secrets[env.OSC_SECRET_KEY_NAME] }}
        region: ${{ env.OSC_REGION }}
        exclude_resource_types: access_key
    - name: 👷 Deploy test cluster
      id: testcluster
      uses: outscale/cluster-api-provider-outscale/.github/actions/deploy_cluster@f505cfa8d2bcc452b7a733879f27307859188ed3 # v1.5.0
      with:
        RUNNER_NAME: ${{ runner.name }}
        OKS_ACCESS_KEY: ${{ secrets.OKS_ACCESS_KEY }}
        OKS_SECRET_KEY: ${{ secrets.OKS_SECRET_KEY }}
        OKS_REGION: ${{ vars.OKS_REGION }}
        OSC_ACCESS_KEY: ${{ secrets[env.OSC_ACCESS_KEY_NAME] }}
        OSC_SECRET_KEY: ${{ secrets[env.OSC_SECRET_KEY_NAME] }}
        OSC_REGION: ${{ env.OSC_REGION }}
        CLUSTER_NAME: "k8s-preloader"
        IMAGE_NAME: ${{ matrix.img_kubernetes }}
        CCM: true
    - name: 🔎 Take snapshot
      id: snapshot
      uses: ./.github/actions/preloader_snapshot
      with:
        KUBECONFIG: ${{ steps.testcluster.outputs.KUBECONFIG }}
        OSC_ACCESS_KEY: ${{ secrets[env.OSC_ACCESS_KEY_NAME] }}
        OSC_SECRET_KEY: ${{ secrets[env.OSC_SECRET_KEY_NAME] }}
        OSC_REGION: ${{ env.OSC_REGION }}
        PRELOADER_IMAGE: ${{ vars.REGISTRY }}/outscale/k8s-image-preloader
        PRELOADER_VERSION: ${{ github.sha }}
    - name: 🔎 Display snapshot ID
      run: |
        echo "snapshot: ${{ steps.snapshot.outputs.SNAPSHOT_ID}}"
